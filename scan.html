<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Jewellery QR Scanner</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,Helvetica,sans-serif;
    background:#f4f4f4;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    width:95%;
    max-width:480px;
    background:#fff;
    border-radius:15px;
    padding:20px;
    box-shadow:0 10px 30px rgba(0,0,0,.15);
    text-align:center;
}

h2{
    margin-bottom:10px;
}

p{
    color:#666;
    margin-bottom:20px;
}

#reader{
    width:100%;
}

.footer{
    margin-top:20px;
    color:#888;
    font-size:13px;
}

</style>

</head>

<body>

<div class="container">

<h2>💍 Jewellery QR Scanner</h2>

<p>Point your camera at the QR Code</p>

<div id="reader"></div>

<div class="footer">
Developed by EJ
</div>

</div>

<script>

const html5QrCode = new Html5Qrcode("reader");

let scanned = false;

function onScanSuccess(decodedText){

    if(scanned)
        return;

    scanned = true;

    html5QrCode.stop();

    let qrValue = decodedText.trim();

    if(qrValue.startsWith("http://") || qrValue.startsWith("https://")){

        try{

            const url = new URL(qrValue);

            qrValue =
                url.searchParams.get("c") ||
                url.searchParams.get("code") ||
                "";

        }catch(e){

            alert("Invalid QR URL");
            scanned = false;
            html5QrCode.start(cameraConfig, config, onScanSuccess);
            return;
        }
    }

    if(!qrValue){

        alert("QR data is empty.");

        scanned = false;

        html5QrCode.start(cameraConfig, config, onScanSuccess);

        return;
    }

    window.location.href =
        "index.html?c=" + encodeURIComponent(qrValue);

}

const cameraConfig = {

    facingMode:{
        ideal:"environment"
    }

};

const config = {

    fps:20,

    qrbox:function(viewfinderWidth,viewfinderHeight){

        const size=Math.min(viewfinderWidth,viewfinderHeight)*0.9;

        return{

            width:size,
            height:size

        };

    },

    aspectRatio:1,

    videoConstraints:{

        width:{
            ideal:1920
        },

        height:{
            ideal:1080
        },

        facingMode:{
            ideal:"environment"
        }

    }

};

Html5Qrcode.getCameras().then(cameras=>{

    if(cameras && cameras.length){

        let cameraId=cameras[0].id;

        const back=cameras.find(c=>
            c.label.toLowerCase().includes("back") ||
            c.label.toLowerCase().includes("rear") ||
            c.label.toLowerCase().includes("environment")
        );

        if(back)
            cameraId=back.id;

        html5QrCode.start(
            cameraId,
            config,
            onScanSuccess
        );

    }

}).catch(err=>{

    alert("Unable to access camera");

});

</script>

</body>
</html>
