<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jewellery Details</title>

<style>
body{
    font-family:Arial,Helvetica,sans-serif;
    background:#f4f4f4;
    margin:0;
    padding:20px;
}
.container{
    max-width:500px;
    margin:auto;
    background:#fff;
    padding:20px;
    border-radius:10px;
    box-shadow:0 2px 10px rgba(0,0,0,.2);
}
h2{
    text-align:center;
    color:#333;
}
table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}
td{
    border:1px solid #ddd;
    padding:10px;
}
td:first-child{
    font-weight:bold;
    background:#f8f8f8;
}
.raw{
    margin-top:20px;
    word-break:break-all;
    color:#666;
    font-size:14px;
}
</style>

</head>

<body>

<div class="container">

<h2>Jewellery Details</h2>

<table>
<tr><td>Shop</td><td id="shop"></td></tr>
<tr><td>Vendor</td><td id="vendor"></td></tr>
<tr><td>Category</td><td id="category"></td></tr>
<tr><td>Sub Category</td><td id="subcategory"></td></tr>
<tr><td>Weight</td><td id="weight"></td></tr>
<tr><td>Retail MC</td><td id="retail"></td></tr>
<tr><td>Wholesale MC</td><td id="wholesale"></td></tr>
<tr><td>Stock MC</td><td id="stock"></td></tr>
</table>

<div class="raw">
<b>QR Value:</b>
<div id="raw"></div>
</div>

</div>

<script>

const params = new URLSearchParams(window.location.search);
const code = params.get("code") || "";

document.getElementById("raw").textContent = code;

if(code.length >= 38){

    document.getElementById("shop").textContent = code.substring(0,2);

    document.getElementById("vendor").textContent = code.substring(3,6);

    document.getElementById("category").textContent =
        code.substring(7,9)=="SS"
        ? "Sterling Silver"
        : code.substring(7,9);

    document.getElementById("subcategory").textContent =
        code.substring(10,12)=="KS"
        ? "Kids Stud"
        : code.substring(10,12);

    document.getElementById("weight").textContent =
        (parseInt(code.substring(14,20))/1000).toFixed(3) + " g";

    document.getElementById("retail").textContent =
        "₹ " + parseInt(code.substring(22,26));

    document.getElementById("wholesale").textContent =
        "₹ " + parseInt(code.substring(28,32));

    document.getElementById("stock").textContent =
        "₹ " + parseInt(code.substring(34,38));
}
else{
    alert("Invalid QR Code");
}

</script>

</body>
</html>
