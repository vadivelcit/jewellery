<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jewellery Details</title>

<style>
body{
    font-family:Arial,Helvetica,sans-serif;
    background:#f4f4f4;
    margin:0;
    padding:20px;
}

.container{
    max-width:500px;
    margin:auto;
    background:#fff;
    padding:20px;
    border-radius:12px;
    box-shadow:0 2px 12px rgba(0,0,0,.15);
}

h2{
    text-align:center;
    margin-bottom:20px;
}

table{
    width:100%;
    border-collapse:collapse;
}

td{
    border:1px solid #ddd;
    padding:10px;
}

td:first-child{
    width:45%;
    font-weight:bold;
    background:#fafafa;
}

.price{
    color:green;
    font-weight:bold;
}

.warning{
    color:red;
    font-weight:bold;
}

.raw{
    margin-top:20px;
    word-break:break-all;
    color:#666;
    font-size:13px;
}
</style>

</head>

<body>

<div class="container">

<h2>Jewellery Details</h2>

<table>

<tr><td>Shop</td><td id="shop"></td></tr>
<tr><td>Vendor</td><td id="vendor"></td></tr>
<tr><td>Category</td><td id="category"></td></tr>
<tr><td>Sub Category</td><td id="subcategory"></td></tr>
<tr><td>Weight</td><td id="weight"></td></tr>
<tr><td>Silver Price / Gram</td><td id="silverPrice"></td></tr>
<tr><td>Retail Price</td><td id="retail" class="price"></td></tr>
<tr><td>Wholesale Price</td><td id="wholesale" class="price"></td></tr>
<tr><td>Stock Price</td><td id="stock" class="price"></td></tr>

</table>

<div class="raw">
<b>QR Value:</b>
<div id="raw"></div>
</div>

</div>

<script>

const params = new URLSearchParams(window.location.search);
const code = (params.get("c") || "").trim();
alert("Received: " + code);
document.getElementById("raw").textContent = code;

const silverPrice = Number(localStorage.getItem("silverPrice") || 0);

document.getElementById("silverPrice").innerHTML =
    silverPrice > 0
    ? "₹ " + silverPrice.toFixed(2)
    : "<span class='warning'>Not Configured</span>";

function valueBetween(start,end){

    const s = code.indexOf(start);

    if(s === -1)
        return "";

    const from = s + start.length;

    if(end == null)
        return code.substring(from);

    const e = code.indexOf(end,from);

    if(e === -1)
        return "";

    return code.substring(from,e);
}

const valid =
    code.startsWith("EJ") &&
    code.includes("B") &&
    code.includes("C") &&
    code.includes("U") &&
    code.includes("W") &&
    code.includes("RM") &&
    code.includes("WM") &&
    code.includes("SM");

if(!valid){

    alert("Invalid QR Code");

    throw new Error("Invalid QR");

}

const shop = code.substring(0,code.indexOf("B"));
const vendor = valueBetween("B","C");
const category = valueBetween("C","U");
const subCategory = valueBetween("U","W");

const weight = Number(valueBetween("W","RM"))/1000;

const retailMC = Number(valueBetween("RM","WM"));
const wholesaleMC = Number(valueBetween("WM","SM"));
const stockMC = Number(valueBetween("SM",null));

document.getElementById("shop").textContent = shop;
document.getElementById("vendor").textContent = vendor;

document.getElementById("category").textContent =
    category=="SS"
    ? "Sterling Silver"
    : category;

document.getElementById("subcategory").textContent =
    subCategory=="KS"
    ? "Kids Stud"
    : subCategory;

document.getElementById("weight").textContent =
    weight.toFixed(3)+" g";

const metalValue = weight * silverPrice;

document.getElementById("retail").textContent =
    "₹ " + (metalValue + retailMC).toFixed(2);

document.getElementById("wholesale").textContent =
    "₹ " + (metalValue + wholesaleMC).toFixed(2);

document.getElementById("stock").textContent =
    "₹ " + (metalValue + stockMC).toFixed(2);

</script>

</body>
</html>
