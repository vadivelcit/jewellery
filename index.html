<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jewellery QR Details</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 550px;
            margin: auto;
            background: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,.15);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        td {
            padding: 10px;
            border: 1px solid #ddd;
        }

        td:first-child {
            font-weight: bold;
            background: #f8f8f8;
            width: 45%;
        }

        .raw {
            margin-top: 20px;
            word-break: break-all;
            color: #666;
        }

        .error {
            color: red;
            font-weight: bold;
            text-align: center;
            margin-bottom: 15px;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>Jewellery QR Details</h2>

    <div id="error" class="error"></div>

    <table>
        <tr>
            <td>Shop</td>
            <td id="shop"></td>
        </tr>
        <tr>
            <td>Vendor</td>
            <td id="vendor"></td>
        </tr>
        <tr>
            <td>Category</td>
            <td id="category"></td>
        </tr>
        <tr>
            <td>Sub Category</td>
            <td id="subcategory"></td>
        </tr>
        <tr>
            <td>Weight</td>
            <td id="weight"></td>
        </tr>
        <tr>
            <td>Retail MC</td>
            <td id="retail"></td>
        </tr>
        <tr>
            <td>Wholesale MC</td>
            <td id="wholesale"></td>
        </tr>
        <tr>
            <td>Stock MC</td>
            <td id="stock"></td>
        </tr>
    </table>

    <div class="raw">
        <strong>QR Value</strong>
        <div id="raw"></div>
    </div>

</div>

<script>
document.addEventListener("DOMContentLoaded", function () {

    const params = new URLSearchParams(window.location.search);
    const code = params.get("code");

    if (!code) {
        document.getElementById("error").textContent = "QR Code not found.";
        return;
    }

    document.getElementById("raw").textContent = code;

    function getValue(startMarker, endMarker) {

        const start = code.indexOf(startMarker);

        if (start === -1)
            return "";

        const from = start + startMarker.length;

        if (!endMarker)
            return code.substring(from);

        const end = code.indexOf(endMarker, from);

        if (end === -1)
            return "";

        return code.substring(from, end);
    }

    const bIndex = code.indexOf("B");

    if (bIndex === -1) {
        document.getElementById("error").textContent = "Invalid QR Code";
        return;
    }

    const shop = code.substring(0, bIndex);
    const vendor = getValue("B", "C");
    const category = getValue("C", "U");
    const subCategory = getValue("U", "W");
    const weight = getValue("W", "RM");
    const retail = getValue("RM", "WM");
    const wholesale = getValue("WM", "SM");
    const stock = getValue("SM", null);

    const categoryMap = {
        SS: "Sterling Silver"
    };

    const subCategoryMap = {
        KS: "Kids Stud"
    };

    document.getElementById("shop").textContent = shop;
    document.getElementById("vendor").textContent = vendor;
    document.getElementById("category").textContent =
        categoryMap[category] || category;

    document.getElementById("subcategory").textContent =
        subCategoryMap[subCategory] || subCategory;

    document.getElementById("weight").textContent =
        weight ? (Number(weight) / 1000).toFixed(3) + " g" : "";

    document.getElementById("retail").textContent =
        retail ? "₹ " + Number(retail) : "";

    document.getElementById("wholesale").textContent =
        wholesale ? "₹ " + Number(wholesale) : "";

    document.getElementById("stock").textContent =
        stock ? "₹ " + Number(stock) : "";

});
</script>

</body>
</html>
